<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Weaver-ID | Mobile Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --primary: #1a5f3f; --primary-light: #2d8a5e; --primary-dark: #0d3d28;
  --accent: #c9a227; --accent-light: #f0e6c3;
  --bg: #f8faf9; --card: #ffffff; --text: #1f2937; --text-light: #6b7280;
  --border: #e5e7eb; --danger: #dc2626; --success: #059669; --warning: #d97706;
  --info: #2563eb;
}
body { 
  font-family: 'Inter', sans-serif; 
  background: #222; 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  min-height: 100vh; 
  padding: 20px;
}

/* PHONE FRAME */
.phone-frame {
  width: 375px;
  height: 812px;
  background: var(--bg);
  border-radius: 40px;
  box-shadow: 0 25px 80px rgba(0,0,0,0.4), 0 0 0 12px #333;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}
.phone-notch {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 150px;
  height: 30px;
  background: #333;
  border-radius: 0 0 20px 20px;
  z-index: 100;
}
.phone-screen {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
  padding-top: 40px;
}
.phone-screen::-webkit-scrollbar { display: none; }

/* STATUS BAR */
.status-bar {
  position: absolute;
  top: 8px;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 25px;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text);
  z-index: 50;
}

/* APP HEADER */
.app-header {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  padding: 20px 20px 24px;
  position: sticky;
  top: 0;
  z-index: 40;
}
.app-header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.app-header-top h1 {
  font-size: 1.25rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.app-header-top h1 i { color: var(--accent-light); }

/* SCAN SCREEN */
.scan-container {
  padding: 30px 20px;
  text-align: center;
}
.scan-illustration {
  width: 200px;
  height: 200px;
  margin: 0 auto 30px;
  position: relative;
}
.scan-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100px;
  height: 100px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  color: white;
  box-shadow: 0 8px 30px rgba(26,95,63,0.3);
}
.scan-btn {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  border: none;
  border-radius: 16px;
  font-size: 1rem;
  font-weight: 600;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(26,95,63,0.25);
  transition: all 0.2s;
}
.scan-btn:active { transform: scale(0.98); }
.scan-btn.scanning {
  background: var(--warning);
  animation: scan-pulse 1s ease infinite;
}
@keyframes scan-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}
.scan-instruction {
  margin-top: 24px;
  font-size: 0.85rem;
  color: var(--text-light);
  line-height: 1.6;
}
.scan-instruction strong { color: var(--text); }

/* RESULT SCREENS */
.result-screen {
  min-height: 100%;
  display: none;
}
.result-screen.active { display: block; }

.result-header {
  padding: 40px 20px 30px;
  text-align: center;
  color: white;
}
.result-header.success { background: linear-gradient(135deg, var(--success), #10b981); }
.result-header.unregistered { background: linear-gradient(135deg, var(--warning), #f59e0b); }
.result-header.suspicious { background: linear-gradient(135deg, var(--danger), #ef4444); }

.result-icon {
  width: 80px;
  height: 80px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  margin: 0 auto 16px;
  backdrop-filter: blur(10px);
}
.result-title {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 6px;
}
.result-subtitle {
  font-size: 0.85rem;
  opacity: 0.9;
}

/* PRODUCT CARD */
.product-card {
  background: var(--card);
  margin: -20px 16px 16px;
  border-radius: 20px;
  padding: 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  position: relative;
  z-index: 10;
}
.product-image-placeholder {
  width: 100%;
  height: 180px;
  background: linear-gradient(135deg, #f0fdf4, #ecfdf5);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  border: 2px dashed #bbf7d0;
}
.product-image-placeholder i {
  font-size: 3rem;
  color: var(--primary);
  opacity: 0.3;
}
.product-name {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.product-meta {
  font-size: 0.8rem;
  color: var(--text-light);
  margin-bottom: 20px;
}

/* DETAIL ROWS */
.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.detail-row:last-child { border-bottom: none; }
.detail-label {
  font-size: 0.8rem;
  color: var(--text-light);
  display: flex;
  align-items: center;
  gap: 8px;
}
.detail-label i { font-size: 0.85rem; color: var(--primary); }
.detail-value {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text);
  text-align: right;
}
.detail-value code {
  font-family: 'SF Mono', monospace;
  background: #f3f4f6;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 0.78rem;
}

/* WEAVER PROFILE */
.weaver-profile {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px;
  background: #f9fafb;
  border-radius: 14px;
  margin-top: 16px;
}
.weaver-avatar-lg {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 700;
  font-size: 1.2rem;
  flex-shrink: 0;
}
.weaver-info h4 {
  font-size: 0.95rem;
  font-weight: 600;
  margin-bottom: 2px;
}
.weaver-info p {
  font-size: 0.78rem;
  color: var(--text-light);
}

/* AUTHENTICATION BADGE */
.auth-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 30px;
  font-size: 0.8rem;
  font-weight: 600;
  margin-top: 16px;
}
.auth-badge.success {
  background: #d1fae5;
  color: var(--success);
}
.auth-badge.warning {
  background: #fef3c7;
  color: var(--warning);
}
.auth-badge.danger {
  background: #fee2e2;
  color: var(--danger);
}

/* ACTION BUTTONS */
.action-bar {
  padding: 16px;
  display: flex;
  gap: 10px;
}
.action-btn {
  flex: 1;
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
}
.action-btn:active { transform: scale(0.97); }
.action-btn.primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
}
.action-btn.secondary {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
}
.action-btn.danger {
  background: #fee2e2;
  color: var(--danger);
}

/* SCAN HISTORY */
.history-section {
  padding: 0 16px 20px;
}
.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  padding: 0 4px;
}
.history-header h3 {
  font-size: 0.95rem;
  font-weight: 600;
}
.history-header a {
  font-size: 0.8rem;
  color: var(--primary);
  text-decoration: none;
  font-weight: 500;
}
.history-item {
  background: var(--card);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.history-icon {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}
.history-icon.success { background: #d1fae5; color: var(--success); }
.history-icon.warning { background: #fef3c7; color: var(--warning); }
.history-icon.danger { background: #fee2e2; color: var(--danger); }
.history-content { flex: 1; }
.history-content p {
  font-size: 0.85rem;
  font-weight: 500;
  margin-bottom: 2px;
}
.history-content span {
  font-size: 0.75rem;
  color: var(--text-light);
}
.history-time {
  font-size: 0.75rem;
  color: var(--text-light);
  white-space: nowrap;
}

/* BOTTOM NAV */
.bottom-nav {
  background: var(--card);
  border-top: 1px solid var(--border);
  padding: 8px 0 24px;
  display: flex;
  justify-content: space-around;
  align-items: center;
}
.nav-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 16px;
  border: none;
  background: none;
  color: var(--text-light);
  font-family: inherit;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.2s;
}
.nav-btn i { font-size: 1.3rem; }
.nav-btn.active {
  color: var(--primary);
  font-weight: 600;
}

  width: 56px;
  height: 5
